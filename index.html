<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 주식 포트폴리오</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- PapaParse (CSV 파싱용) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #0B1120; /* 딥 네이비 배경 */
            color: #E2E8F0;
        }
        /* 스크롤바 커스텀 (테이블용) */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1E293B; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #EAB308; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto space-y-6">
        
        <!-- 헤더 영역 -->
        <header class="flex flex-col md:flex-row justify-between items-center border-b border-yellow-600/30 pb-4">
            <h1 class="text-3xl font-bold text-yellow-500 flex items-center gap-2">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                내 주식 포트폴리오
            </h1>
            
            <!-- 필터 (체크박스) -->
            <div class="mt-4 md:mt-0 flex gap-4 bg-slate-800/50 p-3 rounded-lg border border-slate-700">
                <label class="flex items-center gap-2 cursor-pointer hover:text-yellow-400 transition">
                    <input type="checkbox" id="chkDomestic" checked class="w-5 h-5 accent-yellow-500 cursor-pointer">
                    <span class="font-medium">🇰🇷 국내 주식 (KRX)</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer hover:text-yellow-400 transition">
                    <input type="checkbox" id="chkOverseas" checked class="w-5 h-5 accent-yellow-500 cursor-pointer">
                    <span class="font-medium">🌎 해외 주식</span>
                </label>
            </div>
        </header>

        <!-- 로딩 표시 -->
        <div id="loading" class="text-center py-20 text-yellow-500 text-xl font-bold animate-pulse">
            데이터를 불러오는 중입니다...
        </div>

        <div id="dashboardContent" class="hidden space-y-6">
            <!-- 차트 영역 -->
            <div class="bg-slate-800/80 p-6 rounded-xl shadow-xl border border-slate-700">
                <h2 class="text-xl font-semibold mb-4 text-slate-200 border-l-4 border-yellow-500 pl-3">최고가 대비 등락률</h2>
                <div class="relative h-[300px] w-full">
                    <canvas id="portfolioChart"></canvas>
                </div>
            </div>

            <!-- 상세 테이블 영역 -->
            <div class="bg-slate-800/80 p-6 rounded-xl shadow-xl border border-slate-700 overflow-hidden">
                <h2 class="text-xl font-semibold mb-4 text-slate-200 border-l-4 border-yellow-500 pl-3">종목별 상세 정보</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-900/50 text-yellow-500 border-b border-yellow-600/30">
                                <th class="p-4 font-semibold">종목명</th>
                                <th class="p-4 font-semibold text-right">현재가</th>
                                <th class="p-4 font-semibold text-right">등락률</th>
                                <th class="p-4 font-semibold text-right">최고가 대비</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-slate-700/50">
                            <!-- JS로 데이터 렌더링 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQfFVsBhAN3xXEIMziFD-SWrq3G4FLXH4f0B6BAW7iSAvU6GprQHs7NBZ1ZLVBlnlZIq0JbshYA0WZS/pub?gid=0&single=true&output=csv";
        
        let allData = [];
        let chartInstance = null;

        // 컬럼 키 매핑 객체
        let keys = { code: '', name: '', price: '', change: '', highDrop: '' };

        // DOM 요소
        const chkDomestic = document.getElementById('chkDomestic');
        const chkOverseas = document.getElementById('chkOverseas');
        const dashboardContent = document.getElementById('dashboardContent');
        const loading = document.getElementById('loading');

        // 숫자 파싱 유틸리티 (콤마, % 제거)
        const parseNumber = (str) => {
            if (!str) return 0;
            const num = parseFloat(str.toString().replace(/,/g, '').replace(/%/g, ''));
            return isNaN(num) ? 0 : num;
        };

        // 데이터 불러오기 및 파싱
        Papa.parse(CSV_URL, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                const data = results.data;
                const headers = results.meta.fields;

                // 동적 컬럼명 매칭 (유연하게 처리)
                headers.forEach(h => {
                    const str = h.replace(/\s/g, '');
                    if (str.includes('코드')) keys.code = h;
                    else if (str.includes('명') || str.includes('이름')) keys.name = h;
                    else if (str.includes('최고') && str.includes('대비')) keys.highDrop = h;
                    else if (str.includes('현재') || str.includes('가격')) keys.price = h;
                    else if (str.includes('등락')) keys.change = h;
                });

                // 키 매칭 실패 시 기본 인덱스로 설정하는 폴백(Fallback)
                if (!keys.code) keys.code = headers[0];
                if (!keys.name) keys.name = headers[1];
                if (!keys.price) keys.price = headers[2];
                if (!keys.change) keys.change = headers[3];
                if (!keys.highDrop) keys.highDrop = headers[4] || keys.change; // 없을 경우 대체

                // 전역 배열에 가공된 데이터 저장
                allData = data.map(row => ({
                    code: row[keys.code] || '',
                    name: row[keys.name] || '알 수 없음',
                    priceText: row[keys.price] || '0',
                    changeText: row[keys.change] || '0%',
                    highDropText: row[keys.highDrop] || '0%',
                    highDropVal: parseNumber(row[keys.highDrop]),
                    changeVal: parseNumber(row[keys.change])
                }));

                // 로딩 숨기고 대시보드 표시
                loading.classList.add('hidden');
                dashboardContent.classList.remove('hidden');

                updateDashboard();
            },
            error: function(err) {
                loading.innerHTML = "데이터를 불러오는데 실패했습니다.<br>URL 또는 네트워크 상태를 확인해주세요.";
                loading.classList.replace('text-yellow-500', 'text-red-500');
            }
        });

        // 체크박스 이벤트 리스너 등록
        chkDomestic.addEventListener('change', updateDashboard);
        chkOverseas.addEventListener('change', updateDashboard);

        // 대시보드 업데이트 함수 (필터링 적용)
        function updateDashboard() {
            const showDomestic = chkDomestic.checked;
            const showOverseas = chkOverseas.checked;

            const filteredData = allData.filter(item => {
                const isKRX = item.code.toUpperCase().startsWith('KRX');
                
                // 둘 다 체크된 경우 모두 보여줌
                if (showDomestic && showOverseas) return true;
                // 국내주식만 체크된 경우 KRX 종목만 보여줌
                if (showDomestic && isKRX) return true;
                // 해외주식만 체크된 경우 KRX 이외의 종목만 보여줌
                if (showOverseas && !isKRX) return true;
                
                // 둘 다 체크 해제된 경우 아무것도 안 보여줌
                return false;
            });

            renderChart(filteredData);
            renderTable(filteredData);
        }

        // 1. 차트 렌더링
        function renderChart(data) {
            const ctx = document.getElementById('portfolioChart').getContext('2d');
            
            const labels = data.map(item => item.name);
            const dropData = data.map(item => item.highDropVal);
            
            // 색상 조건: -20% 이하면 빨강, 아니면 초록
            const bgColors = dropData.map(val => val <= -20 ? 'rgba(239, 68, 68, 0.8)' : 'rgba(16, 185, 129, 0.8)'); // Red : Green
            const borderColors = dropData.map(val => val <= -20 ? 'rgba(239, 68, 68, 1)' : 'rgba(16, 185, 129, 1)');

            if (chartInstance) {
                chartInstance.destroy(); // 기존 차트 삭제
            }

            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '최고가 대비 등락률 (%)',
                        data: dropData,
                        backgroundColor: bgColors,
                        borderColor: borderColors,
                        borderWidth: 1,
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: (context) => `${context.raw}%`
                            }
                        }
                    },
                    scales: {
                        y: {
                            grid: { color: 'rgba(255, 255, 255, 0.1)' },
                            ticks: { 
                                color: '#94A3B8',
                                callback: function(value) { return value + '%'; }
                            }
                        },
                        x: {
                            grid: { display: false },
                            ticks: {
                                color: function(context) {
                                    const val = dropData[context.index];
                                    if (val !== undefined && val <= -20) {
                                        return '#EF4444'; // -20% 이하면 빨간색 지정
                                    }
                                    return '#CBD5E1'; // 기본 색상
                                },
                                autoSkip: false, // 라벨 자동 생략 방지 (모든 종목명 표시)
                                maxRotation: 45, // 텍스트가 겹치지 않게 45도 기울임
                                minRotation: 45,
                                // 조건에 따른 폰트 굵기 처리 (-20% 이하면 굵게)
                                font: function(context) {
                                    const val = dropData[context.index];
                                    if (val !== undefined && val <= -20) {
                                        return { weight: 'bold', size: 13 };
                                    }
                                    return { weight: 'normal', size: 12 };
                                }
                            }
                        }
                    }
                }
            });
        }

        // 2. 테이블 렌더링
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-6 text-center text-slate-400">조건에 맞는 데이터가 없습니다.</td></tr>`;
                return;
            }

            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-slate-700/30 transition-colors';

                // 등락률 색상 처리 (양수면 빨강/골드 계열, 음수면 파랑/초록 등 - 여기서는 단순 양/음수 색상)
                const changeColor = item.changeVal > 0 ? 'text-red-400' : (item.changeVal < 0 ? 'text-blue-400' : 'text-slate-300');
                
                // 최고가 대비 -20% 이하일 때 종목명 굵게, 등락률 강하게 표시
                const isDanger = item.highDropVal <= -20;
                const nameStyle = isDanger ? 'font-bold text-red-400' : 'font-medium text-slate-200';
                const dropStyle = isDanger ? 'font-bold text-red-500' : 'text-green-400';

                tr.innerHTML = `
                    <td class="p-4 ${nameStyle}">
                        <div class="flex flex-col">
                            <span>${item.name}</span>
                            <span class="text-xs text-slate-500 font-normal">${item.code}</span>
                        </div>
                    </td>
                    <td class="p-4 text-right text-slate-300 font-mono">${item.priceText}</td>
                    <td class="p-4 text-right font-mono ${changeColor}">${item.changeVal > 0 ? '+' : ''}${item.changeText}</td>
                    <td class="p-4 text-right font-mono ${dropStyle}">${item.highDropText}</td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
