<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 주식 포트폴리오 대시보드</title>
    <!-- Tailwind CSS for Layout -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- PapaParse for CSV Parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --navy-dark: #0f172a;
            --navy-light: #1e293b;
            --gold: #d4af37;
            --gold-light: #f59e0b;
            --danger: #ef4444;
            --success: #10b981;
        }

        body {
            background-color: var(--navy-dark);
            color: #f8fafc;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        .gold-gradient-text {
            background: linear-gradient(to right, var(--gold), #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            background-color: var(--navy-light);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .table-header {
            border-bottom: 2px solid var(--gold);
        }

        tr:nth-child(even) {
            background-color: rgba(255, 255, 255, 0.03);
        }

        .negative { color: var(--danger); }
        .positive { color: var(--success); }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--navy-dark); }
        ::-webkit-scrollbar-thumb { background: var(--navy-light); border-radius: 4px; border: 1px solid var(--gold); }

        #loadingOverlay {
            position: fixed;
            inset: 0;
            background: var(--navy-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Loading Overlay -->
    <div id="loadingOverlay">
        <div class="text-center">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-[#d4af37] mb-4"></div>
            <p class="text-lg font-semibold gold-gradient-text">데이터를 불러오는 중...</p>
        </div>
    </div>

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="mb-10 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl md:text-4xl font-bold gold-gradient-text mb-2 flex items-center gap-2">
                    <i data-lucide="trending-up" class="w-8 h-8 text-[#d4af37]"></i>
                    내 주식 포트폴리오
                </h1>
                <p class="text-slate-400">실시간 최고가 대비 수익률 및 자산 현황 분석</p>
            </div>
            <div class="card px-4 py-2 flex items-center gap-4">
                <div class="text-right">
                    <p class="text-xs text-slate-400 uppercase tracking-wider">마지막 업데이트</p>
                    <p id="updateTime" class="text-sm font-mono text-[#d4af37]">-</p>
                </div>
                <button onclick="fetchData()" class="p-2 hover:bg-white/10 rounded-full transition-colors">
                    <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <!-- Top Metrics (Optional visualization of summary) -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8" id="summaryCards">
            <!-- Summary stats will be injected here if needed -->
        </div>

        <!-- Main Chart Section -->
        <section class="card p-6 mb-8">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-semibold flex items-center gap-2">
                    <i data-lucide="bar-chart-3" class="text-[#d4af37]"></i>
                    종목별 최고가 대비 등락률 (%)
                </h2>
                <span class="text-xs text-slate-400">* -20% 이하는 <span class="text-red-500 font-bold">빨간색</span>으로 표시됨</span>
            </div>
            <div class="h-[400px] w-full">
                <canvas id="portfolioChart"></canvas>
            </div>
        </section>

        <!-- Detailed Table Section -->
        <section class="card overflow-hidden">
            <div class="p-6 border-b border-white/10">
                <h2 class="text-xl font-semibold flex items-center gap-2">
                    <i data-lucide="list" class="text-[#d4af37]"></i>
                    상세 포트폴리오 현황
                </h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="table-header bg-white/5">
                            <th class="p-4 font-medium text-slate-300">종목명</th>
                            <th class="p-4 font-medium text-slate-300 text-right">현재가</th>
                            <th class="p-4 font-medium text-slate-300 text-right">일일 등락률</th>
                            <th class="p-4 font-medium text-slate-300 text-right">최고가 대비</th>
                        </tr>
                    </thead>
                    <tbody id="stockTableBody">
                        <!-- Data rows injected here -->
                    </tbody>
                </table>
            </div>
        </section>
        
        <footer class="mt-8 text-center text-slate-500 text-sm">
            <p>&copy; 2024 Portfolio Dashboard. Data sourced from Google Sheets.</p>
        </footer>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQfFVsBhAN3xXEIMziFD-SWrq3G4FLXH4f0B6BAW7iSAvU6GprQHs7NBZ1ZLVBlnlZIq0JbshYA0WZS/pub?gid=0&single=true&output=csv';
        let portfolioChart = null;

        // Initialize Icons
        lucide.createIcons();

        // Helper to format currency
        const formatPrice = (val) => {
            const num = parseFloat(val);
            if (isNaN(num)) return val;
            return num.toLocaleString() + '원';
        };

        // Helper to format percentage
        const formatPercent = (val) => {
            const num = parseFloat(val);
            if (isNaN(num)) return '0%';
            return (num > 0 ? '+' : '') + num.toFixed(2) + '%';
        };

        async function fetchData() {
            document.getElementById('loadingOverlay').style.display = 'flex';
            
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    renderDashboard(results.data);
                    document.getElementById('loadingOverlay').style.display = 'none';
                    document.getElementById('updateTime').innerText = new Date().toLocaleTimeString();
                },
                error: function(err) {
                    console.error("CSV Load Error:", err);
                    alert("데이터를 불러오는 데 실패했습니다.");
                    document.getElementById('loadingOverlay').style.display = 'none';
                }
            });
        }

        function renderDashboard(data) {
            const labels = data.map(item => item['종목명']);
            const highDiffData = data.map(item => parseFloat(item['최고가 대비 등락률'] || 0));
            const currentPrices = data.map(item => item['현재가']);
            const dailyChanges = data.map(item => item['등락률']);

            // 1. Render Table
            const tableBody = document.getElementById('stockTableBody');
            tableBody.innerHTML = '';
            
            data.forEach(item => {
                const row = document.createElement('tr');
                const diff = parseFloat(item['최고가 대비 등락률']);
                const daily = parseFloat(item['등락률']);
                
                row.className = 'hover:bg-white/5 transition-colors border-b border-white/5';
                row.innerHTML = `
                    <td class="p-4 ${diff <= -20 ? 'font-extrabold text-red-500' : 'font-semibold text-slate-100'}">${item['종목명']}</td>
                    <td class="p-4 text-right font-mono">${formatPrice(item['현재가'])}</td>
                    <td class="p-4 text-right font-mono ${daily >= 0 ? 'positive' : 'negative'}">${formatPercent(item['등락률'])}</td>
                    <td class="p-4 text-right font-mono font-bold ${diff <= -20 ? 'text-red-500' : 'text-slate-200'}">${formatPercent(item['최고가 대비 등락률'])}</td>
                `;
                tableBody.appendChild(row);
            });

            // 2. Render Chart
            renderChart(labels, highDiffData);
        }

        function renderChart(labels, values) {
            const ctx = document.getElementById('portfolioChart').getContext('2d');
            
            if (portfolioChart) {
                portfolioChart.destroy();
            }

            // Determine colors based on -20% threshold
            const backgroundColors = values.map(val => val <= -20 ? '#ef4444' : '#10b981');
            const borderColors = values.map(val => val <= -20 ? '#b91c1c' : '#059669');

            portfolioChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '최고가 대비 등락률 (%)',
                        data: values,
                        backgroundColor: backgroundColors,
                        borderColor: borderColors,
                        borderWidth: 1,
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: false,
                            grid: { color: 'rgba(255, 255, 255, 0.1)' },
                            ticks: { 
                                color: '#94a3b8',
                                callback: function(value) { return value + '%'; }
                            }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { 
                                color: function(context) {
                                    return values[context.index] <= -20 ? '#ef4444' : '#94a3b8';
                                },
                                font: function(context) {
                                    return {
                                        weight: values[context.index] <= -20 ? 'bold' : 'normal'
                                    };
                                }
                            }
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#1e293b',
                            titleColor: '#d4af37',
                            bodyColor: '#f8fafc',
                            borderColor: 'rgba(212, 175, 55, 0.5)',
                            borderWidth: 1,
                            callbacks: {
                                label: function(context) {
                                    return `등락률: ${context.parsed.y}%`;
                                }
                            }
                        }
                    }
                }
            });
        }

        // Initial Fetch
        window.onload = fetchData;
    </script>
</body>
</html>
